# FINAL CORRECTED - Robust Nginx config that logs to container stdout

user  nginx;
worker_processes  auto;
pid /var/run/nginx.pid;

# The "daemon off;" line has been REMOVED from here.

# Point error logs to the container's standard error stream.
error_log stderr;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Define our custom unified log format
    log_format unified '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" level=info';

    # Point access logs to the container's standard output stream, using our format.
    access_log /dev/stdout unified;

    server {
        listen 80;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}